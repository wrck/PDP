apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdp-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pdp-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pdp-api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: pdp-api:dev
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: pdp-api-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi

