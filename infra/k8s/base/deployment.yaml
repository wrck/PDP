# PDP API Deployment
# 3 副本，无状态可水平扩展；非敏感配置由 ConfigMap（pdp-config）注入，凭据由 Secret（pdp-secrets）注入。
# 部署前须完成容量压测并冻结 resources、镜像标签与探针阈值。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdp-api
  namespace: pdp
  labels:
    app: pdp
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pdp
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pdp
        component: api
    spec:
      # 生产镜像仓库凭据：部署时创建对应 imagePullSecret 并在此引用。
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
        - name: pdp-api
          # 部署时替换为经认证的具体版本标签，禁止在生产使用 :latest。
          image: ghcr.io/wrck/pdp-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pdp-config
            - secretRef:
                name: pdp-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 3
          # 资源请求/限值为占位值，部署时按容量压测与数据库连接预算冻结。
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
