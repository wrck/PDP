components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: https://idp.example.com/.well-known/openid-configuration
  parameters:
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    WorkspaceIdPath:
      name: workspaceId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    PackageIdPath:
      name: packageId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    VersionIdPath:
      name: versionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 当前资源 revision 对应的强校验值；不匹配返回 409
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      description: 平台签发的不透明 keyset 游标，绑定排序、过滤和权限范围；禁止客户端解析或修改
      schema:
        type: string
        minLength: 16
        maxLength: 2048
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    Problem:
      description: 标准问题响应
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    WorkspacePage:
      description: 工作空间分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
              nextCursor:
                type: [string, 'null']
                description: 下一页不透明 keyset 游标；为 null 表示没有下一页
  schemas:
    Uuid:
      type: string
      format: uuid
    ObjectRef:
      type: object
      required: [objectType, objectId]
      properties:
        objectType:
          type: string
          pattern: '^[a-z][a-z0-9.-]{1,99}$'
        objectId:
          $ref: '#/components/schemas/Uuid'
    SearchResult:
      type: object
      required: [object, title, objectType, indexedAt]
      properties:
        object:
          $ref: '#/components/schemas/ObjectRef'
        objectType:
          type: string
        title:
          type: string
        summary:
          type: string
        indexedAt:
          type: string
          format: date-time
        revision:
          type: integer
    SearchPage:
      type: object
      required: [items, nextCursor, indexedAt]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        nextCursor:
          type: [string, 'null']
        indexedAt:
          type: string
          format: date-time
    Notification:
      type: object
      required: [id, eventId, type, title, createdAt, read, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        eventId:
          $ref: '#/components/schemas/Uuid'
        type:
          type: string
        title:
          type: string
        body:
          type: string
        target:
          oneOf:
            - $ref: '#/components/schemas/ObjectRef'
            - type: 'null'
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
        readAt:
          type: [string, 'null']
          format: date-time
        revision:
          type: integer
    NotificationPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        nextCursor:
          type: [string, 'null']
    Problem:
      type: object
      required: [type, title, status, traceId]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
        traceId:
          type: string
        violations:
          type: array
          items:
            type: object
            required: [field, code]
            properties:
