name: pdp-local

services:
  mysql:
    image: mysql:8.4
    profiles: [mysql]
    environment:
      MYSQL_DATABASE: ${PDP_DB_NAME:-pdp}
      MYSQL_USER: ${PDP_DB_USER:-pdp}
      MYSQL_PASSWORD: ${PDP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${PDP_DB_ROOT_PASSWORD}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_bin
      - --transaction-isolation=READ-COMMITTED
    ports:
      - "${PDP_DB_PORT:-3306}:3306"
    volumes:
      - pdp-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  legacy-mysql:
    image: mysql:5.7
    profiles: [migration]
    environment:
      MYSQL_DATABASE: ${LEGACY_DB_NAME:-legacy_pdp}
      MYSQL_USER: ${LEGACY_DB_USER:-legacy_reader}
      MYSQL_PASSWORD: ${LEGACY_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${LEGACY_DB_ROOT_PASSWORD}
      TZ: UTC
    ports:
      - "${LEGACY_DB_PORT:-3307}:3306"
    volumes:
      - legacy-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    profiles: [platform]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${PDP_REDIS_PORT:-6379}:6379"
    volumes:
      - pdp-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: [platform]
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${PDP_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${PDP_S3_SECRET_KEY}
    ports:
      - "${PDP_S3_PORT:-9000}:9000"
      - "${PDP_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - pdp-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    profiles: [observability]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ../observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

volumes:
  pdp-mysql:
  legacy-mysql:
  pdp-redis:
  pdp-minio:

