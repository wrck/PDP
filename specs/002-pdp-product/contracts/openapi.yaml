openapi: 3.1.0
info:
  title: PDP P1 平台 API
  version: 1.0.0
  description: |
    PDP 企业级项目交付管理平台 P1 的稳定同步接口边界。
    本契约覆盖关键闭环，不枚举领域包生成的所有对象页面。
servers:
  - url: /api/v1
security:
  - oidc: []
tags:
  - name: 工作空间
  - name: 领域包
  - name: 项目
  - name: 计划
  - name: 交付件
  - name: 审批
  - name: 治理
  - name: 数据迁移
  - name: 作业
paths:
  /workspaces:
    get:
      tags: [工作空间]
      summary: 获取当前用户可访问的工作空间
      operationId: listWorkspaces
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/WorkspacePage'
    post:
      tags: [工作空间]
      summary: 创建工作空间
      operationId: createWorkspace
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants:
    post:
      tags: [工作空间]
      summary: 授予跨工作空间协作权限
      operationId: createCollaborationGrant
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollaborationGrantCommand'
      responses:
        '201':
          description: 授权已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaborationGrant'
        '403':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants/{grantId}/revoke:
    post:
      tags: [工作空间]
      summary: 撤销跨工作空间授权
      operationId: revokeCollaborationGrant
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: grantId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '204':
          description: 已撤销
        '409':
          $ref: '#/components/responses/Problem'
  /domain-packages:
    get:
      tags: [领域包]
      summary: 查询当前工作空间可用领域包
      operationId: listDomainPackages
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: layer
          in: query
          schema:
            type: string
            enum: [PLATFORM_STANDARD, INDUSTRY, WORKSPACE_CUSTOMER]
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 领域包分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackagePage'
    post:
      tags: [领域包]
      summary: 创建领域包草稿
      operationId: createDomainPackage
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainPackageCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackage'
  /domain-packages/{packageId}/versions/{versionId}/validate:
    post:
      tags: [领域包]
      summary: 校验领域包版本
      operationId: validateDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '202':
          description: 校验作业已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /domain-packages/{packageId}/versions/{versionId}/publish:
    post:
      tags: [领域包]
      summary: 审核并发布领域包版本
      operationId: publishDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishPackageCommand'
      responses:
        '200':
          description: 已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageVersion'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /projects:
    get:
      tags: [项目]
      summary: 按权限查询项目
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: lifecycle
          in: query
          schema:
            type: string
        - name: managerId
          in: query
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: query
          in: query
          schema:
            type: string
            maxLength: 200
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 项目分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPage'
    post:
      tags: [项目]
      summary: 从空白或模板创建项目
      operationId: createProject
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectCommand'
      responses:
        '201':
          description: 已创建并返回模板实例化结果
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    get:
      tags: [项目]
      summary: 获取项目详情
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: 项目详情
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/transitions:
    post:
      tags: [项目]
      summary: 推进、回退、暂停、取消或关闭项目
      operationId: transitionProject
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionCommand'
      responses:
        '200':
          description: 转换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/tasks:
    post:
      tags: [计划]
      summary: 创建任务
      operationId: createTask
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /tasks/{taskId}/transitions:
    post:
      tags: [计划]
      summary: 转换任务状态
      operationId: transitionTask
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: taskId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionCommand'
      responses:
        '200':
          description: 转换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/baselines:
    post:
      tags: [计划]
      summary: 创建计划基线
      operationId: createPlanBaseline
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBaselineCommand'
      responses:
        '201':
          description: 基线草稿已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanBaseline'
  /projects/{projectId}/deliverables:
    post:
      tags: [交付件]
      summary: 创建交付件
      operationId: createDeliverable
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliverableCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deliverable'
  /deliverables/{deliverableId}/versions:
    post:
      tags: [交付件]
      summary: 登记新的交付件文件版本
      operationId: createDeliverableVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: deliverableId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliverableVersionCommand'
      responses:
        '201':
          description: 版本已登记
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverableVersion'
  /approvals:
    post:
      tags: [审批]
      summary: 提交统一审批
      operationId: submitApproval
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitApprovalCommand'
      responses:
        '201':
          description: 审批已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
  /approvals/{approvalId}/actions:
    post:
      tags: [审批]
      summary: 办理审批动作
      operationId: actOnApproval
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: approvalId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionCommand'
      responses:
        '200':
          description: 动作已执行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/change-requests:
    post:
      tags: [治理]
      summary: 创建项目变更申请
      operationId: createChangeRequest
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChangeRequestCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRequest'
  /data-migrations:
    post:
      tags: [数据迁移]
      summary: 创建 MySQL 历史数据迁移计划并指定 PDP 目标数据库
      operationId: createMigrationProgram
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMigrationProgramCommand'
      responses:
        '201':
          description: 迁移计划已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationProgram'
        '422':
          $ref: '#/components/responses/Problem'
  /data-migrations/{programId}:
    get:
      tags: [数据迁移]
      summary: 获取迁移计划、门禁和运行摘要
      operationId: getMigrationProgram
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: programId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: 迁移计划
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationProgram'
        '404':
          $ref: '#/components/responses/Problem'
  /data-migrations/{programId}/runs:
    post:
      tags: [数据迁移]
      summary: 启动盘点、试运行、全量、核对或切换运行
      operationId: startMigrationRun
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: programId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartMigrationRunCommand'
      responses:
        '202':
          description: 迁移运行已进入队列
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationRun'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /data-migrations/{programId}/reconciliation:
    get:
      tags: [数据迁移]
      summary: 获取最新迁移核对结果
      operationId: getMigrationReconciliation
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: programId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: 核对摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationSummary'
  /data-migrations/{programId}/cutover-decisions:
    post:
      tags: [数据迁移]
      summary: 记录 Go/No-Go、开放写入、回退或前向修复决策
      operationId: decideMigrationCutover
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: programId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CutoverDecisionCommand'
      responses:
        '200':
          description: 决策已记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationProgram'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /jobs/{jobId}:
    get:
      tags: [作业]
      summary: 查询后台作业进度和失败明细
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: jobId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: 作业状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackgroundJob'
components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: https://idp.example.com/.well-known/openid-configuration
  parameters:
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    WorkspaceIdPath:
      name: workspaceId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    PackageIdPath:
      name: packageId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    VersionIdPath:
      name: versionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 当前资源 revision 对应的强校验值；不匹配返回 409
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      description: 平台签发的不透明 keyset 游标，绑定排序、过滤和权限范围；禁止客户端解析或修改
      schema:
        type: string
        minLength: 16
        maxLength: 2048
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    Problem:
      description: 标准问题响应
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    WorkspacePage:
      description: 工作空间分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
              nextCursor:
                type: [string, 'null']
                description: 下一页不透明 keyset 游标；为 null 表示没有下一页
  schemas:
    Uuid:
      type: string
      format: uuid
    ObjectRef:
      type: object
      required: [objectType, objectId]
      properties:
        objectType:
          type: string
          pattern: '^[a-z][a-z0-9.-]{1,99}$'
        objectId:
          $ref: '#/components/schemas/Uuid'
    Problem:
      type: object
      required: [type, title, status, traceId]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
        traceId:
          type: string
        violations:
          type: array
          items:
            type: object
            required: [field, code]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
    CreateWorkspaceCommand:
      type: object
      required: [code, name, ownerUserId]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_-]{2,31}$'
        name:
          type: string
          minLength: 2
          maxLength: 100
        ownerUserId:
          $ref: '#/components/schemas/Uuid'
        defaultLocale:
          type: string
          default: zh-CN
        defaultTimezone:
          type: string
          default: Asia/Shanghai
    Workspace:
      type: object
      required: [id, code, name, status, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [DRAFT, ACTIVE, SUSPENDED, ARCHIVED]
        revision:
          type: integer
    CreateCollaborationGrantCommand:
      type: object
      required: [collaboratorWorkspaceId, target, roleId, allowedActions, validUntil]
      properties:
        collaboratorWorkspaceId:
          $ref: '#/components/schemas/Uuid'
        target:
          $ref: '#/components/schemas/ObjectRef'
        roleId:
          $ref: '#/components/schemas/Uuid'
        allowedActions:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
        validUntil:
          type: string
          format: date-time
        reason:
          type: string
          maxLength: 500
    CollaborationGrant:
      allOf:
        - $ref: '#/components/schemas/CreateCollaborationGrantCommand'
        - type: object
          required: [id, status, revision]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            status:
              type: string
              enum: [DRAFT, ACTIVE, EXPIRED, REVOKED]
            revision:
              type: integer
    ReasonCommand:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 2
          maxLength: 1000
    CreateDomainPackageCommand:
      type: object
      required: [stableKey, name, layer]
      properties:
        stableKey:
          type: string
          pattern: '^[a-z][a-z0-9.-]{2,99}$'
        name:
          type: string
          maxLength: 100
        layer:
          type: string
          enum: [PLATFORM_STANDARD, INDUSTRY, WORKSPACE_CUSTOMER]
        parentPackageId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
    DomainPackage:
      allOf:
        - $ref: '#/components/schemas/CreateDomainPackageCommand'
        - type: object
          required: [id, status]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            status:
