openapi: 3.1.0
info:
  title: PDP P1 平台 API
  version: 1.1.0
  description: |
    PDP 企业级项目交付管理平台 P1 的稳定同步接口边界。
    本契约与 coverage.md 共同覆盖全部 P1 稳定操作；领域包生成页面使用
    domain-package.schema.json 定义的元数据，不为客户复制私有接口。
x-pdp-contract-coverage: ./coverage.md
servers:
  - url: /api/v1
security:
  - oidc: []
tags:
  - name: 工作空间
  - name: 领域包
  - name: 项目模板
  - name: 项目
  - name: 计划
  - name: 交付件
  - name: 平台工作流
  - name: 审批
  - name: 治理
  - name: 权限与数据
  - name: 搜索与通知
  - name: 运行保障
  - name: 数据迁移
  - name: 数据库
  - name: 作业
paths:
  /workspaces:
    get:
      tags: [工作空间]
      summary: 获取当前用户可访问的工作空间
      operationId: listWorkspaces
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/WorkspacePage'
    post:
      tags: [工作空间]
      summary: 创建工作空间
      operationId: createWorkspace
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants:
    post:
      tags: [工作空间]
      summary: 授予跨工作空间协作权限
      operationId: createCollaborationGrant
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollaborationGrantCommand'
      responses:
        '201':
          description: 授权已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaborationGrant'
        '403':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants/{grantId}/revoke:
    post:
      tags: [工作空间]
      summary: 撤销跨工作空间授权
      operationId: revokeCollaborationGrant
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: grantId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '204':
          description: 已撤销
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}:
    get:
      tags: [工作空间]
      summary: 获取工作空间详情
      operationId: getWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      responses:
        '200':
          description: 工作空间详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [工作空间]
      summary: 更新工作空间基本信息（名称、描述、默认语言/时区）
      operationId: updateWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceCommand'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/activate:
    post:
      tags: [工作空间]
      summary: 激活工作空间（DRAFT/SUSPENDED → ACTIVE）
      operationId: activateWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 已激活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/suspend:
    post:
      tags: [工作空间]
      summary: 暂停工作空间（ACTIVE → SUSPENDED）
      operationId: suspendWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '200':
          description: 已暂停
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/archive:
    post:
      tags: [工作空间]
      summary: 归档工作空间（ACTIVE/SUSPENDED → ARCHIVED）
      operationId: archiveWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '200':
          description: 已归档
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/restore:
    post:
      tags: [工作空间]
      summary: 恢复归档工作空间（ARCHIVED → SUSPENDED）
      operationId: restoreWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 已恢复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/owner:
    put:
      tags: [工作空间]
      summary: 转移工作空间负责人
      operationId: transferWorkspaceOwner
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferOwnerCommand'
      responses:
        '200':
          description: 已转移
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/organizations:
    get:
      tags: [工作空间]
      summary: 查询组织树
      operationId: listOrganizations
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: parentId
          in: query
          description: 父组织 ID；不传返回顶层组织
          schema:
            oneOf:
              - $ref: '#/components/schemas/Uuid'
              - type: 'null'
      responses:
        '200':
          $ref: '#/components/responses/OrganizationPage'
    post:
      tags: [工作空间]
      summary: 创建组织
      operationId: createOrganization
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/organizations/{organizationId}:
    get:
      tags: [工作空间]
      summary: 获取组织详情
      operationId: getOrganization
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: organizationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: 组织详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [工作空间]
      summary: 更新组织信息
      operationId: updateOrganization
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: organizationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationCommand'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '409':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [工作空间]
      summary: 停用组织（软删除，保留子组织和历史）
      operationId: deactivateOrganization
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: organizationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: 已停用
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/organizations/{organizationId}/move:
    post:
      tags: [工作空间]
      summary: 调整组织层级（移动到新父组织）
      operationId: moveOrganization
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: organizationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveOrganizationCommand'
      responses:
        '200':
          description: 已移动
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/members:
    get:
      tags: [工作空间]
      summary: 查询工作空间成员
      operationId: listWorkspaceMembers
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: organizationId
          in: query
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: roleId
          in: query
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED, REMOVED]
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceMemberPage'
    post:
      tags: [工作空间]
      summary: 添加工作空间成员
      operationId: addWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkspaceMemberCommand'
      responses:
        '201':
          description: 已添加
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/members/{memberId}:
    get:
      tags: [工作空间]
      summary: 获取成员详情
      operationId: getWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: memberId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: 成员详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        '404':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [工作空间]
      summary: 更新成员（角色、组织归属、数据范围）
      operationId: updateWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: memberId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceMemberCommand'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        '409':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [工作空间]
      summary: 移除成员（FR-068 撤权，最长 1 分钟生效）
      operationId: removeWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: memberId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: 已移除
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/members/{memberId}/suspend:
    post:
      tags: [工作空间]
      summary: 暂停成员访问（ACTIVE → SUSPENDED）
      operationId: suspendWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: memberId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '200':
          description: 已暂停
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/members/{memberId}/resume:
    post:
      tags: [工作空间]
      summary: 恢复成员访问（SUSPENDED → ACTIVE）
      operationId: resumeWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: memberId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 已恢复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/roles:
    get:
      tags: [工作空间]
      summary: 查询工作空间角色
      operationId: listWorkspaceRoles
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: includeSystem
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceRolePage'
    post:
      tags: [工作空间]
      summary: 创建自定义角色
      operationId: createWorkspaceRole
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRoleCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRole'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/roles/{roleId}:
    get:
      tags: [工作空间]
      summary: 获取角色详情
      operationId: getWorkspaceRole
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: 角色详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRole'
        '404':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [工作空间]
      summary: 更新角色（权限、数据范围、描述）
      operationId: updateWorkspaceRole
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRoleCommand'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRole'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/roles/{roleId}/disable:
    post:
      tags: [工作空间]
      summary: 停用角色（ACTIVE → DISABLED）
      operationId: disableWorkspaceRole
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 已停用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRole'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/data-scopes:
    get:
      tags: [工作空间]
      summary: 查询数据范围定义
      operationId: listDataScopes
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/DataScopePage'
    post:
      tags: [工作空间]
      summary: 创建数据范围
      operationId: createDataScope
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataScopeCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataScope'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/data-scopes/{scopeId}:
    patch:
      tags: [工作空间]
      summary: 更新数据范围
      operationId: updateDataScope
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: scopeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDataScopeCommand'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataScope'
        '409':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [工作空间]
      summary: 删除数据范围（需无引用）
      operationId: deleteDataScope
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: scopeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: 已删除
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants/list:
    get:
      tags: [工作空间]
      summary: 查询跨工作空间协作授权
      operationId: listCollaborationGrants
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ACTIVE, EXPIRED, REVOKED]
        - name: direction
          in: query
          description: 授权方向；OUTGOING 授予他空间，INCOMING 被他空间授予
          schema:
            type: string
            enum: [OUTGOING, INCOMING]
            default: OUTGOING
      responses:
        '200':
          $ref: '#/components/responses/CollaborationGrantPage'
  /domain-packages:
    get:
      tags: [领域包]
      summary: 查询当前工作空间可用领域包
      operationId: listDomainPackages
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: layer
          in: query
          schema:
            type: string
            enum: [PLATFORM_STANDARD, INDUSTRY, WORKSPACE_CUSTOMER]
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ACTIVE, DEPRECATED, RETIRED]
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 领域包分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackagePage'
    post:
      tags: [领域包]
      summary: 创建领域包草稿
      operationId: createDomainPackage
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainPackageCommand'
      responses:
        '201':
          description: 已创建
          headers:
            Location:
              schema:
                type: string
