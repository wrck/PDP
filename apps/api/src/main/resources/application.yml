spring:
  application:
    name: pdp-api
  config:
    import:
      - optional:classpath:application-datasource.yml
      - optional:classpath:application-workflow.yml
  profiles:
    default: local,mysql
  threads:
    virtual:
      enabled: true
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
