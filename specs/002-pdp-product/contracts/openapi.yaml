    post:
      tags: [平台工作流]
      summary: 校验 BPMN 流程定义
      operationId: validateWorkflowDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [processDefinitionKey, businessVersion, bpmnXml]
              properties:
                processDefinitionKey:
                  type: string
                  pattern: '^[a-z][a-z0-9.-]{2,99}$'
                businessVersion:
                  type: string
                  pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
                domainPackageVersionId:
                  oneOf:
                    - $ref: '#/components/schemas/Uuid'
                    - type: 'null'
                bpmnXml:
                  type: string
                  minLength: 50
      responses:
        '200':
          description: 校验结果
          content:
            application/json:
              schema:
                type: object
                required: [valid, contentHash, findings]
                properties:
                  valid:
                    type: boolean
                  contentHash:
                    type: string
                  findings:
                    type: array
                    items:
                      type: object
                      required: [severity, code, message]
                      properties:
                        severity:
                          type: string
                          enum: [ERROR, WARNING]
                        code:
                          type: string
                        message:
                          type: string
