  /notifications:
    get:
      tags: [搜索与通知]
      summary: 查询当前用户的站内通知
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 站内通知分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
  /notifications/{notificationId}/read:
    post:
      tags: [搜索与通知]
      summary: 将站内通知标记为已读
      operationId: markNotificationRead
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: notificationId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: 已更新通知
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '409':
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: https://idp.example.com/.well-known/openid-configuration
  parameters:
    WorkspaceHeader:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    WorkspaceIdPath:
      name: workspaceId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    PackageIdPath:
      name: packageId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    VersionIdPath:
      name: versionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 当前资源 revision 对应的强校验值；不匹配返回 409
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      description: 平台签发的不透明 keyset 游标，绑定排序、过滤和权限范围；禁止客户端解析或修改
      schema:
        type: string
        minLength: 16
        maxLength: 2048
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    Problem:
      description: 标准问题响应
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    WorkspacePage:
      description: 工作空间分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
              nextCursor:
                type: [string, 'null']
                description: 下一页不透明 keyset 游标；为 null 表示没有下一页
    OrganizationPage:
      description: 组织分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
              nextCursor:
                type: [string, 'null']
    WorkspaceMemberPage:
      description: 工作空间成员分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceMember'
              nextCursor:
                type: [string, 'null']
    WorkspaceRolePage:
      description: 工作空间角色分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceRole'
              nextCursor:
                type: [string, 'null']
    DataScopePage:
      description: 数据范围分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/DataScope'
              nextCursor:
                type: [string, 'null']
    CollaborationGrantPage:
      description: 跨工作空间协作授权分页
      content:
        application/json:
          schema:
            type: object
            required: [items, nextCursor]
            properties:
              items:
                type: array
                items:
                  $ref: '#/components/schemas/CollaborationGrant'
              nextCursor:
                type: [string, 'null']
  schemas:
    Uuid:
      type: string
      format: uuid
    ObjectRef:
      type: object
      required: [objectType, objectId]
      properties:
        objectType:
          type: string
          pattern: '^[a-z][a-z0-9.-]{1,99}$'
        objectId:
          $ref: '#/components/schemas/Uuid'
    SearchResult:
      type: object
      required: [object, title, objectType, indexedAt]
      properties:
        object:
          $ref: '#/components/schemas/ObjectRef'
        objectType:
          type: string
        title:
          type: string
        summary:
          type: string
        indexedAt:
          type: string
          format: date-time
        revision:
          type: integer
    SearchPage:
      type: object
      required: [items, nextCursor, indexedAt]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        nextCursor:
          type: [string, 'null']
        indexedAt:
          type: string
          format: date-time
    Notification:
      type: object
      required: [id, eventId, type, title, createdAt, read, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        eventId:
          $ref: '#/components/schemas/Uuid'
        type:
          type: string
        title:
          type: string
        body:
          type: string
        target:
          oneOf:
            - $ref: '#/components/schemas/ObjectRef'
            - type: 'null'
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
        readAt:
          type: [string, 'null']
          format: date-time
        revision:
          type: integer
    NotificationPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        nextCursor:
          type: [string, 'null']
    Problem:
      type: object
      required: [type, title, status, traceId]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
        traceId:
          type: string
        violations:
          type: array
          items:
            type: object
            required: [field, code]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
    CreateWorkspaceCommand:
      type: object
      required: [code, name, ownerUserId]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_-]{2,31}$'
        name:
          type: string
          minLength: 2
          maxLength: 100
        ownerUserId:
          $ref: '#/components/schemas/Uuid'
        defaultLocale:
          type: string
          default: zh-CN
        defaultTimezone:
          type: string
          default: Asia/Shanghai
    Workspace:
      type: object
      required: [id, code, name, status, ownerUserId, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
          maxLength: 500
        status:
          type: string
          enum: [DRAFT, ACTIVE, SUSPENDED, ARCHIVED]
        ownerUserId:
          $ref: '#/components/schemas/Uuid'
        defaultLocale:
          type: string
          default: zh-CN
        defaultTimezone:
          type: string
          default: Asia/Shanghai
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateWorkspaceCommand:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 500
        defaultLocale:
          type: string
        defaultTimezone:
          type: string
    TransferOwnerCommand:
      type: object
      required: [newOwnerUserId, reason]
      properties:
        newOwnerUserId:
          $ref: '#/components/schemas/Uuid'
        reason:
          type: string
          minLength: 2
          maxLength: 500
    CreateCollaborationGrantCommand:
      type: object
      required: [collaboratorWorkspaceId, target, roleId, allowedActions, validUntil]
      properties:
        collaboratorWorkspaceId:
          $ref: '#/components/schemas/Uuid'
        target:
          $ref: '#/components/schemas/ObjectRef'
        roleId:
          $ref: '#/components/schemas/Uuid'
        allowedActions:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
        validUntil:
          type: string
          format: date-time
        reason:
          type: string
          maxLength: 500
    CollaborationGrant:
      allOf:
        - $ref: '#/components/schemas/CreateCollaborationGrantCommand'
        - type: object
          required: [id, status, revision]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            status:
              type: string
              enum: [DRAFT, ACTIVE, EXPIRED, REVOKED]
            revision:
              type: integer
    ReasonCommand:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 2
          maxLength: 1000
    CreateOrganizationCommand:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_-]{1,31}$'
        name:
          type: string
          minLength: 2
          maxLength: 100
        parentId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        description:
          type: [string, 'null']
          maxLength: 500
    UpdateOrganizationCommand:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 500
    MoveOrganizationCommand:
      type: object
      required: [newParentId]
      properties:
        newParentId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
          description: 新父组织 ID；null 表示移动到顶层
    Organization:
      type: object
      required: [id, workspaceId, code, name, status, path, depth, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        workspaceId:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        parentId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        path:
          type: string
          description: 物化路径，如 /root/region-a/org-x
        depth:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AddWorkspaceMemberCommand:
      type: object
      required: [userId, roleIds]
      properties:
        userId:
          $ref: '#/components/schemas/Uuid'
        roleIds:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Uuid'
        organizationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        dataScopeIds:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Uuid'
          default: []
        validUntil:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
    UpdateWorkspaceMemberCommand:
      type: object
      properties:
        roleIds:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Uuid'
        organizationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        dataScopeIds:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Uuid'
        validUntil:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
    WorkspaceMember:
      type: object
      required: [id, workspaceId, userId, status, roleIds, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        workspaceId:
          $ref: '#/components/schemas/Uuid'
        userId:
          $ref: '#/components/schemas/Uuid'
        userDisplayName:
          type: string
        userAvatarUrl:
          type: [string, 'null']
        organizationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        organizationName:
          type: [string, 'null']
        roleIds:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        roleNames:
          type: array
          items:
            type: string
        dataScopeIds:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, REMOVED]
        validUntil:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateWorkspaceRoleCommand:
      type: object
      required: [key, name, permissions]
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9._-]{1,63}$'
          description: 角色稳定键，如 workspace.admin
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 500
        permissions:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: '^[a-z][a-z0-9._-]{1,127}$'
          description: 功能权限稳定键列表，如 project.task.create
        dataScopeType:
          type: string
          enum: [WORKSPACE, ORGANIZATION, REGION, CUSTOMER, PROJECT_OWNERSHIP, PARTICIPATION, OBJECT_ATTRIBUTE]
          default: WORKSPACE
        isSystem:
          type: boolean
          default: false
          description: 系统角色不可删除，仅可查询
    UpdateWorkspaceRoleCommand:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 500
        permissions:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^[a-z][a-z0-9._-]{1,127}$'
        dataScopeType:
          type: string
          enum: [WORKSPACE, ORGANIZATION, REGION, CUSTOMER, PROJECT_OWNERSHIP, PARTICIPATION, OBJECT_ATTRIBUTE]
    WorkspaceRole:
      type: object
      required: [id, workspaceId, key, name, permissions, dataScopeType, status, isSystem, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        workspaceId:
          $ref: '#/components/schemas/Uuid'
        key:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        permissions:
          type: array
          items:
            type: string
        dataScopeType:
          type: string
          enum: [WORKSPACE, ORGANIZATION, REGION, CUSTOMER, PROJECT_OWNERSHIP, PARTICIPATION, OBJECT_ATTRIBUTE]
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        isSystem:
          type: boolean
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateDataScopeCommand:
      type: object
      required: [key, name, scopeType, rules]
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9._-]{1,63}$'
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 500
        scopeType:
          type: string
          enum: [WORKSPACE, ORGANIZATION, REGION, CUSTOMER, PROJECT_OWNERSHIP, PARTICIPATION, OBJECT_ATTRIBUTE]
        rules:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DataScopeRule'
    UpdateDataScopeCommand:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 500
        rules:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DataScopeRule'
    DataScopeRule:
      type: object
      required: [field, operator, value]
      properties:
        field:
          type: string
          description: 数据范围字段键，如 organizationId、region、customerId
        operator:
          type: string
          enum: [EQ, IN, LIKE, GT, GTE, LT, LTE, BETWEEN, NOT_NULL, IS_NULL]
        value:
          description: 比较值；类型依字段而定（字符串、数值、数组等）
          oneOf:
            - type: string
            - type: number
            - type: integer
            - type: boolean
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: number
            - type: 'null'
    DataScope:
      type: object
      required: [id, workspaceId, key, name, scopeType, rules, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        workspaceId:
          $ref: '#/components/schemas/Uuid'
        key:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        scopeType:
          type: string
          enum: [WORKSPACE, ORGANIZATION, REGION, CUSTOMER, PROJECT_OWNERSHIP, PARTICIPATION, OBJECT_ATTRIBUTE]
        rules:
          type: array
          items:
            $ref: '#/components/schemas/DataScopeRule'
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateDomainPackageCommand:
      type: object
      required: [stableKey, name, layer, designerPrincipalId]
      properties:
        stableKey:
          type: string
          pattern: '^[a-z][a-z0-9.-]{2,99}$'
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        layer:
          type: string
          enum: [PLATFORM_STANDARD, INDUSTRY, WORKSPACE_CUSTOMER]
        parentPackageId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        designerPrincipalId:
          type: string
          maxLength: 128
          description: 设计者主体 ID；与发布者必须不同（FR-167、US2 验收场景 3）。
        designerPrincipalType:
          type: string
          enum: [USER, SERVICE_ACCOUNT, GOVERNANCE_ROLE]
          default: USER
    UpdateDomainPackageCommand:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 2000
    DomainPackage:
      type: object
      required: [id, stableKey, name, layer, status, designer, publisher, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        stableKey:
          type: string
          pattern: '^[a-z][a-z0-9.-]{2,99}$'
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        layer:
          type: string
          enum: [PLATFORM_STANDARD, INDUSTRY, WORKSPACE_CUSTOMER]
        parentPackageId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        status:
          type: string
          enum: [DRAFT, ACTIVE, DEPRECATED, RETIRED]
        designer:
          $ref: '#/components/schemas/PrincipalRef'
        publisher:
          $ref: '#/components/schemas/PrincipalRef'
        currentPublishedVersionId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PrincipalRef:
      type: object
      required: [principalType, principalId]
      properties:
        principalType:
          type: string
          enum: [USER, SERVICE_ACCOUNT, GOVERNANCE_ROLE]
        principalId:
          type: string
          maxLength: 128
        displayLabel:
          type: string
          maxLength: 200
    CreateDomainPackageVersionCommand:
      type: object
      required: [semanticVersion, manifest]
      properties:
        semanticVersion:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
        manifest:
          type: object
          additionalProperties: true
          description: |
            符合 domain-package.schema.json 的 manifest 内容；
            发布前必须通过结构、引用、状态、规则、权限、迁移和回滚校验。
        parentSnapshotId:
          oneOf:
            - type: string
            - type: 'null'
        extendsVersionRange:
          type: string
          maxLength: 50
    UpdateDomainPackageVersionDraftCommand:
      type: object
      required: [manifest]
      properties:
        manifest:
          type: object
          additionalProperties: true
        compatibilityStatement:
          type: object
          additionalProperties: false
          required: [compatibilityLevel, consumerImpact]
          properties:
            compatibilityLevel:
              type: string
              enum: [MAJOR_BREAKING, MINOR_BREAKING, ADDITIVE, PATCH_ONLY]
            consumerImpact:
              type: string
              maxLength: 2000
            deprecationWindow:
              type: object
              additionalProperties: false
              properties:
                deprecatedAt:
                  type: string
                  format: date-time
                sunsetAt:
                  type: string
                  format: date-time
    DomainPackageVersion:
      type: object
      required: [id, packageId, semanticVersion, contentHash, status, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        packageId:
          $ref: '#/components/schemas/Uuid'
        semanticVersion:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
        contentHash:
          type: string
        status:
          type: string
          enum: [DRAFT, VALIDATING, REVIEW_PENDING, PUBLISHED, REJECTED, DEPRECATED, RETIRED, FROZEN]
        parentSnapshotId:
          oneOf:
            - type: string
            - type: 'null'
        runtimeSnapshotId:
          oneOf:
            - type: string
            - type: 'null'
        revision:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DomainPackageVersionDetail:
      allOf:
        - $ref: '#/components/schemas/DomainPackageVersion'
        - type: object
          required: [manifest]
          properties:
            manifest:
              type: object
              additionalProperties: true
            compatibilityStatement:
              type: object
              additionalProperties: true
            lastValidationResult:
              oneOf:
