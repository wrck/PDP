openapi: 3.1.0
info:
  title: PDP P1 平台 API
  version: 1.1.0
  description: |
    PDP 企业级项目交付管理平台 P1 的稳定同步接口边界。
    本契约与 coverage.md 共同覆盖全部 P1 稳定操作；领域包生成页面使用
    domain-package.schema.json 定义的元数据，不为客户复制私有接口。
x-pdp-contract-coverage: ./coverage.md
servers:
  - url: /api/v1
security:
  - oidc: []
tags:
  - name: 工作空间
  - name: 领域包
  - name: 项目模板
  - name: 项目
  - name: 计划
  - name: 交付件
  - name: 平台工作流
  - name: 审批
  - name: 治理
  - name: 权限与数据
  - name: 搜索与通知
  - name: 运行保障
  - name: 数据迁移
  - name: 数据库
  - name: 作业
paths:
  /workspaces:
    get:
      tags: [工作空间]
      summary: 获取当前用户可访问的工作空间
      operationId: listWorkspaces
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/WorkspacePage'
    post:
      tags: [工作空间]
      summary: 创建工作空间
      operationId: createWorkspace
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}:
    get:
      tags: [工作空间]
      summary: 获取工作空间治理详情
      operationId: getWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      responses:
        '200':
          description: 工作空间详情
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/actions:
    post:
      tags: [工作空间]
      summary: 执行工作空间状态迁移
      operationId: applyWorkspaceAction
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceActionCommand'
      responses:
        '200':
          description: 状态迁移成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/organizations:
    get:
      tags: [工作空间]
      summary: 查询工作空间组织结构
      operationId: listOrganizationUnits
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      responses:
        '200':
          description: 组织单元
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationUnit'
    post:
      tags: [工作空间]
      summary: 创建组织单元
      operationId: createOrganizationUnit
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationUnitCommand'
      responses:
        '201':
          description: 组织单元已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationUnit'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/members:
    get:
      tags: [工作空间]
      summary: 查询工作空间成员
      operationId: listWorkspaceMembers
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceMembership'
    post:
      tags: [工作空间]
      summary: 添加工作空间成员
      operationId: addWorkspaceMember
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkspaceMemberCommand'
      responses:
        '201':
          description: 成员已添加
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMembership'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/roles:
    get:
      tags: [工作空间]
      summary: 查询工作空间角色
      operationId: listWorkspaceRoles
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      responses:
        '200':
          description: 角色列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceRole'
    post:
      tags: [工作空间]
      summary: 创建工作空间角色
      operationId: createWorkspaceRole
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRoleCommand'
      responses:
        '201':
          description: 角色已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceRole'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/data-scopes:
    post:
      tags: [工作空间]
      summary: 创建数据范围
      operationId: createDataScope
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataScopeCommand'
      responses:
        '201':
          description: 数据范围已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataScope'
        '409':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants:
    get:
      tags: [工作空间]
      summary: 查询跨工作空间协作授权
      operationId: listCollaborationGrants
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      responses:
        '200':
          description: 授权列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollaborationGrant'
    post:
      tags: [工作空间]
      summary: 授予跨工作空间协作权限
      operationId: createCollaborationGrant
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollaborationGrantCommand'
      responses:
        '201':
          description: 授权已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaborationGrant'
        '403':
          $ref: '#/components/responses/Problem'
  /workspaces/{workspaceId}/collaboration-grants/{grantId}/revoke:
    post:
      tags: [工作空间]
      summary: 撤销跨工作空间授权
      operationId: revokeCollaborationGrant
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - name: grantId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '204':
          description: 已撤销
        '409':
          $ref: '#/components/responses/Problem'
  /domain-packages:
    get:
      tags: [领域包]
      summary: 查询当前工作空间可用领域包
      operationId: listDomainPackages
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: layer
          in: query
          schema:
            type: string
            enum: [PLATFORM_STANDARD, INDUSTRY, WORKSPACE_CUSTOMER]
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 领域包分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackagePage'
    post:
      tags: [领域包]
      summary: 创建领域包草稿
      operationId: createDomainPackage
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainPackageCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackage'
  /domain-packages/{packageId}/versions:
    post:
      tags: [领域包]
      summary: 创建领域包版本草稿
      operationId: createDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainPackageVersionCommand'
      responses:
        '201':
          description: 版本草稿已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageVersion'
        '409':
          $ref: '#/components/responses/Problem'
  /domain-packages/{packageId}/versions/{versionId}/validate:
    post:
      tags: [领域包]
      summary: 校验领域包版本
      operationId: validateDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: 校验完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageValidationReport'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /domain-packages/{packageId}/versions/{versionId}/review:
    post:
      tags: [领域包]
      summary: 审核领域包版本
      operationId: reviewDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewDomainPackageCommand'
      responses:
        '200':
          description: 审核完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageVersion'
        '409':
          $ref: '#/components/responses/Problem'
  /domain-packages/{packageId}/versions/{versionId}/publish:
    post:
      tags: [领域包]
      summary: 审核并发布领域包版本
      operationId: publishDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishPackageCommand'
      responses:
        '200':
          description: 已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageVersion'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /domain-packages/{packageId}/versions/{versionId}/retire:
    post:
      tags: [领域包]
      summary: 退役领域包版本
      operationId: retireDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonCommand'
      responses:
        '200':
          description: 已退役
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageVersion'
  /domain-packages/{packageId}/versions/{versionId}/rollback:
    post:
      tags: [领域包]
      summary: 回滚领域包版本
      operationId: rollbackDomainPackageVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackDomainPackageCommand'
      responses:
        '200':
          description: 已回滚
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageVersion'
        '409':
          $ref: '#/components/responses/Problem'
  /domain-packages/{packageId}/versions/{versionId}/migration-preview:
    post:
      tags: [领域包]
      summary: 预览领域包升级影响
      operationId: previewDomainPackageMigration
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewDomainPackageMigrationCommand'
      responses:
        '200':
          description: 影响预览
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageMigrationPreview'
  /domain-packages/{packageId}/versions/{versionId}/migrations:
    post:
      tags: [领域包]
      summary: 启动领域包实例迁移
      operationId: startDomainPackageMigration
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/PackageIdPath'
        - $ref: '#/components/parameters/VersionIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDomainPackageMigrationCommand'
      responses:
        '202':
          description: 迁移作业已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPackageMigrationJob'
        '409':
          $ref: '#/components/responses/Problem'
  /projects:
    get:
      tags: [项目]
      summary: 按权限查询项目
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: lifecycle
          in: query
          schema:
            type: string
        - name: managerId
          in: query
          schema:
            $ref: '#/components/schemas/Uuid'
        - name: query
          in: query
          schema:
            type: string
            maxLength: 200
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 项目分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPage'
    post:
      tags: [项目]
      summary: 从空白或模板创建项目
      operationId: createProject
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectCommand'
      responses:
        '201':
          description: 已创建并返回模板实例化结果
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    get:
      tags: [项目]
      summary: 获取项目详情
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: 项目详情
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/transitions:
    post:
      tags: [项目]
      summary: 推进、回退、暂停、取消或关闭项目
      operationId: transitionProject
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionCommand'
      responses:
        '200':
          description: 转换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/tasks:
    post:
      tags: [计划]
      summary: 创建任务
      operationId: createTask
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /tasks/{taskId}/transitions:
    post:
      tags: [计划]
      summary: 转换任务状态
      operationId: transitionTask
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: taskId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionCommand'
      responses:
        '200':
          description: 转换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/baselines:
    post:
      tags: [计划]
      summary: 创建计划基线
      operationId: createPlanBaseline
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBaselineCommand'
      responses:
        '201':
          description: 基线草稿已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanBaseline'
  /projects/{projectId}/deliverables:
    post:
      tags: [交付件]
      summary: 创建交付件
      operationId: createDeliverable
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliverableCommand'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deliverable'
  /deliverables/{deliverableId}/versions:
    post:
      tags: [交付件]
      summary: 登记新的交付件文件版本
      operationId: createDeliverableVersion
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - name: deliverableId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliverableVersionCommand'
      responses:
        '201':
          description: 版本已登记
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverableVersion'
  /approvals:
    post:
      tags: [审批]
      summary: 提交统一审批
      operationId: submitApproval
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitApprovalCommand'
      responses:
        '201':
          description: 审批已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
  /workflow-definitions/validate:
    post:
      tags: [平台工作流]
      summary: 校验 BPMN 流程定义
      operationId: validateWorkflowDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [processDefinitionKey, businessVersion, bpmnXml]
              properties:
                processDefinitionKey:
                  type: string
                  pattern: '^[a-z][a-z0-9.-]{2,99}$'
                businessVersion:
                  type: string
                  pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
                domainPackageVersionId:
                  oneOf:
                    - $ref: '#/components/schemas/Uuid'
                    - type: 'null'
                bpmnXml:
                  type: string
                  minLength: 50
      responses:
        '200':
          description: 校验结果
          content:
            application/json:
              schema:
                type: object
                required: [valid, contentHash, findings]
                properties:
                  valid:
                    type: boolean
                  contentHash:
                    type: string
                  findings:
                    type: array
                    items:
                      type: object
                      required: [severity, code, message]
                      properties:
                        severity:
                          type: string
