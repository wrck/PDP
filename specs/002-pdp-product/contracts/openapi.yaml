          enum: [INTERACTIVE_READ, INTERACTIVE_WRITE, ASYNC_JOB, RECOVERY, CUTOVER]
        sli:
          type: string
        objective:
          type: string
        capacityProfile:
          type: string
        failureModes:
          type: array
          items:
            type: string
        alertPolicy:
          type: string
        owner:
          type: string
        runbook:
          type: string
          format: uri-reference
    AvailabilityReport:
      type: object
      required: [period, serviceMinutes, excludedMinutes, unavailableMinutes, availability, status]
      properties:
        period:
          type: string
          pattern: '^\d{4}-\d{2}$'
        serviceMinutes:
          type: integer
          minimum: 1
        excludedMinutes:
          type: integer
          minimum: 0
        unavailableMinutes:
          type: integer
          minimum: 0
        availability:
          type: number
          minimum: 0
          maximum: 1
        status:
          type: string
          enum: [MEETING, AT_RISK, BREACHED]
    DatabaseDeployment:
      type: object
      required: [id, stableKey, databaseType, databaseVersion, certificationBaseline, writeAuthority, status, switchCapabilities, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        stableKey:
          type: string
          pattern: '^[a-z][a-z0-9-]{2,63}$'
        databaseType:
          type: string
          enum: [MYSQL]
        databaseVersion:
          type: string
        certificationBaseline:
          type: string
        writeAuthority:
          type: string
          enum: [PRIMARY]
        status:
          type: string
          enum: [CERTIFIED, DEGRADED, UNSUPPORTED]
        switchCapabilities:
          type: array
          description: 从当前部署出发的获批切换组合；P1 仅返回目标产品为 MYSQL 的组合
          items:
            $ref: '#/components/schemas/DatabaseSwitchCapability'
        revision:
          type: integer
          minimum: 0
    DatabaseSwitchCapability:
      type: object
      required: [sourceDatabaseType, targetDatabaseType, minimumSourceVersion, minimumTargetVersion, status]
      properties:
        sourceDatabaseType:
          type: string
          enum: [MYSQL]
        targetDatabaseType:
          type: string
          enum: [MYSQL]
        minimumSourceVersion:
          type: string
        minimumTargetVersion:
          type: string
        status:
          type: string
          enum: [CERTIFIED, SUSPENDED, UNSUPPORTED]
        constraintSummary:
          type: array
          items:
            type: string
    CreateDatabaseSwitchCommand:
      type: object
      required: [sourceDeploymentId, targetDeploymentId, targetDatabaseType, targetDatabaseVersion, previewToken, reconciliationRunId, reason]
      properties:
        sourceDeploymentId:
          $ref: '#/components/schemas/Uuid'
        targetDeploymentId:
          $ref: '#/components/schemas/Uuid'
        targetDatabaseType:
          type: string
          enum: [MYSQL]
        targetDatabaseVersion:
          type: string
        previewToken:
          type: string
        reconciliationRunId:
          $ref: '#/components/schemas/Uuid'
        reason:
          type: string
          minLength: 10
          maxLength: 2000
    DatabaseSwitch:
      type: object
      required: [id, sourceDeploymentId, targetDeploymentId, sourceDatabaseType, targetDatabaseType, status, writeAuthority, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        sourceDeploymentId:
          $ref: '#/components/schemas/Uuid'
        targetDeploymentId:
          $ref: '#/components/schemas/Uuid'
        sourceDatabaseType:
          type: string
          enum: [MYSQL]
        targetDatabaseType:
          type: string
          enum: [MYSQL]
        status:
          type: string
          enum: [PLANNED, REHEARSING, READY, FREEZING, SWITCHING, VALIDATING, STABILIZING, COMPLETED, ROLLING_BACK, FAILED, CANCELLED]
        writeAuthority:
          type: string
          enum: [SOURCE, TARGET, FROZEN]
        revision:
          type: integer
          minimum: 0
    CreateOperationPreviewCommand:
      type: object
      required: [operationType, targetType, targetIds, expectedRevisions, commandDigest]
      properties:
        operationType:
          type: string
        targetType:
          type: string
        targetIds:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Uuid'
        expectedRevisions:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        commandDigest:
          type: string
    OperationImpactPreview:
      type: object
      required: [previewId, operationType, affectedCounts, warnings, irreversibleAt, compensation, confirmationToken, expiresAt]
      properties:
        previewId:
          $ref: '#/components/schemas/Uuid'
        operationType:
          type: string
        affectedCounts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        warnings:
          type: array
          items:
            type: string
        irreversibleAt:
          type: string
        compensation:
          type: string
        confirmationToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    CreateMigrationProgramCommand:
      type: object
      required: [stableKey, name, sourceDatabaseVersion, targetDatabaseType, targetDatabaseVersion, mappingVersion, plannedCutoverAt]
      properties:
        stableKey:
          type: string
          pattern: '^[a-z][a-z0-9.-]{2,99}$'
        name:
          type: string
          minLength: 2
          maxLength: 200
        sourceDatabaseVersion:
          type: string
          minLength: 1
          maxLength: 50
        sourceTimezone:
          type: string
        sourceCharacterSet:
          type: string
        sourceCollation:
          type: string
        targetDatabaseType:
          type: string
          enum: [MYSQL]
          description: 当前部署选择的认证目标数据库
        targetDatabaseVersion:
          type: string
          minLength: 1
          maxLength: 50
        mappingVersion:
          type: string
          minLength: 1
          maxLength: 50
        plannedCutoverAt:
          type: string
          format: date-time
        scope:
          type: object
          additionalProperties: true
    MigrationProgram:
      type: object
      required:
        [id, stableKey, name, targetDatabaseType, targetDatabaseVersion, status, mappingVersion, blockerCount, rehearsalCount, revision]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        stableKey:
          type: string
        name:
          type: string
        targetDatabaseType:
          type: string
          enum: [MYSQL]
        targetDatabaseVersion:
          type: string
        status:
          type: string
          enum:
            [DRAFT, INVENTORY, MAPPING, REHEARSING, READY, CUTTING_OVER, STABILIZING, COMPLETED, PAUSED, CANCELLED]
        mappingVersion:
          type: string
        blockerCount:
          type: integer
          minimum: 0
        rehearsalCount:
          type: integer
          minimum: 0
        latestCdcLagSeconds:
          type: [integer, 'null']
          minimum: 0
        finalUnappliedChangeCount:
          type: [integer, 'null']
          minimum: 0
        writeMode:
          type: string
          enum: [SOURCE_WRITABLE, SOURCE_FROZEN, TARGET_WRITABLE, SOURCE_READ_ONLY]
        revision:
          type: integer
    StartMigrationRunCommand:
      type: object
      required: [runType, mappingVersion]
      properties:
        runType:
          type: string
          enum:
            [PROFILE, DRY_RUN, FULL_LOAD, CDC, DATABASE_SWITCH, RECONCILIATION, CUTOVER, ROLLBACK_REHEARSAL]
        mappingVersion:
          type: string
        sourceSnapshotId:
          type: string
        sourcePosition:
          type: string
        scope:
          type: object
          additionalProperties: true
    MigrationRun:
      type: object
      required:
        [id, programId, runType, mappingVersion, status, progress, loadedRecords, quarantinedRecords]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        programId:
          $ref: '#/components/schemas/Uuid'
        runType:
          type: string
          enum:
            [PROFILE, DRY_RUN, FULL_LOAD, CDC, DATABASE_SWITCH, RECONCILIATION, CUTOVER, ROLLBACK_REHEARSAL]
        mappingVersion:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, VALIDATING, PAUSED, COMPLETED, FAILED, CANCELLED]
        progress:
          type: number
          minimum: 0
          maximum: 100
        sourcePosition:
          type: [string, 'null']
        loadedRecords:
          type: integer
          minimum: 0
        quarantinedRecords:
          type: integer
          minimum: 0
        failedRecords:
          type: integer
          minimum: 0
        cdcLagSeconds:
          type: [integer, 'null']
          minimum: 0
        reportFileId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
    ReconciliationSummary:
      type: object
      required: [programId, runId, result, blockerCount, checks]
      properties:
        programId:
          $ref: '#/components/schemas/Uuid'
        runId:
          $ref: '#/components/schemas/Uuid'
        result:
          type: string
          enum: [PASS, FAIL]
        blockerCount:
          type: integer
          minimum: 0
        checks:
          type: array
          items:
            type: object
            required: [ruleKey, sourceValue, targetValue, result]
            properties:
              ruleKey:
                type: string
              sourceValue: {}
              targetValue: {}
              difference: {}
              result:
                type: string
                enum: [PASS, FAIL, WAIVED]
    CutoverDecisionCommand:
      type: object
      required: [decisionType, decision, evidenceSummary]
      properties:
        decisionType:
          type: string
          enum: [GO_NO_GO, OPEN_TARGET_WRITES, ROLLBACK, FORWARD_FIX, DECOMMISSION_SOURCE]
        decision:
          type: string
          enum: [GO, NO_GO, APPROVED, REJECTED]
        evidenceSummary:
          type: string
          minLength: 10
          maxLength: 5000
        reconciliationRunId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
    WorkflowDefinitionSummary:
      type: object
      required: [id, processDefinitionKey, businessVersion, contentHash, status, deployedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        processDefinitionKey:
          type: string
        businessVersion:
          type: string
        contentHash:
          type: string
        domainPackageVersionId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        status:
          type: string
          enum: [VALIDATED, DEPLOYED, DEPRECATED, RETIRED]
        deployedAt:
          type: string
          format: date-time
    WorkflowInstanceSummary:
      type: object
      required: [id, definitionId, businessObjectRef, state, revision, incidentCount]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        definitionId:
          $ref: '#/components/schemas/Uuid'
        businessObjectRef:
          type: object
          additionalProperties: true
        state:
          type: string
          enum: [STARTING, ACTIVE, SUSPENDED, COMPLETED, TERMINATED, INCIDENT]
        currentActivityKeys:
          type: array
          items:
            type: string
        incidentCount:
          type: integer
          minimum: 0
        revision:
          type: integer
          minimum: 0
        incidents:
          type: array
          description: 用于平台诊断的 incident 与 dead-letter 摘要；业务接口不得直接暴露引擎表。
          items:
            $ref: '#/components/schemas/WorkflowIncidentSummary'
    WorkflowIncidentSummary:
      type: object
      required: [id, code, message, status, attempts, occurredAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [OPEN, RETRYING, RESOLVED, DEAD_LETTER]
        attempts:
          type: integer
          minimum: 0
        occurredAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, 'null']
          format: date-time
    WorkflowAdminActionCommand:
      type: object
      required: [action, reason, expectedRevision]
      properties:
        action:
          type: string
          enum: [PAUSE, RESUME, RETRY, MIGRATE, TERMINATE, MANUAL_COMPENSATE]
        reason:
          type: string
          minLength: 5
          maxLength: 2000
        expectedRevision:
          type: integer
          minimum: 0
        targetDefinitionId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        impactPreviewId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
    JobAccepted:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          $ref: '#/components/schemas/Uuid'
        status:
          const: QUEUED
    BackgroundJob:
      type: object
      required: [id, jobType, status, progress]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        jobType:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, PAUSED, COMPLETED, FAILED, CANCELLED]
        progress:
          type: number
          minimum: 0
          maximum: 100
        failureCount:
          type: integer
          minimum: 0
        resultFileId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
