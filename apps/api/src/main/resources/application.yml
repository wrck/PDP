spring:
  application:
    name: pdp-api
  config:
    import:
      - optional:classpath:application-datasource.yml
      - optional:classpath:application-workflow.yml
  profiles:
    default: local,mysql
  threads:
    virtual:
      enabled: true
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false

server:
  shutdown: graceful

pdp:
  domain-package:
    cursor:
      active-key-id: ${PDP_CURSOR_ACTIVE_KEY_ID}
      active-key-base64: ${PDP_CURSOR_ACTIVE_KEY_BASE64}
      ttl: ${PDP_CURSOR_TTL:PT1H}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
